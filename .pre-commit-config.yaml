repos:

  - repo: local
    hooks:
      - id: docformatter
        name: docformatter
        entry: uv run docformatter
        language: system
        types: [python]
        args: [--in-place, --wrap-summaries=88, --wrap-descriptions=88]

      - id: check-private-docstrings
        name: check private docstrings
        entry: uv run python scripts/check_private_docstrings.py
        language: system
        types: [python]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
        args: [superhero_project]

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        types: [python]
        pass_filenames: false
