[project]
name = "superhero-project"
dynamic = ["version"]
requires-python = ">=3.12"
license = { file = "LICENSE" }
dependencies = [
    "aiofiles>=24.0",
    "alembic>=1.13,<2",
    "asyncpg",
    "fastapi>=0.115,<1",
    "itsdangerous>=2.0,<3",
    "httpx>=0.27,<1",
    "jinja2>=3.0,<4",
    "markdown-it-py>=3.0,<4",
    "pydantic-settings>=2.0,<3",
    "sqlalchemy[asyncio]>=2.0,<3",
    "uvicorn[standard]>=0.30,<1",
]

[dependency-groups]
dev = [
    "anyio>=4.0,<5",
    "docformatter>=1.7,<2",
    "mypy>=1.0,<2",
    "pre-commit",
    "psycopg[binary]>=3.2,<4",
    "pytest>=8.0,<9",
    "pytest-cov>=5.0,<7",
    "pytest-dotenv>=0.5,<1",
    "pytest-postgresql>=6.0,<7",
    "ruff",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"
fallback-version = "0.0.0"

[tool.ruff]
line-length = 88

[tool.ruff.lint]
preview = true
select = ["E", "F", "I", "N", "PT", "UP", "RUF", "D1", "PLC0415"]

[tool.ruff.lint.per-file-ignores]
"alembic/*" = ["D1"]  # auto-generated boilerplate

[tool.ruff.lint.isort]
force-single-line = true

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy", "sqlalchemy.ext.mypy.plugin"]

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true

[tool.pytest.ini_options]
testpaths = ["tests"]
env_files = [".env.test"]
addopts = "-vv --cov=superhero_project --cov-report=term-missing"
postgresql_host = "127.0.0.1"
postgresql_port = 5433  # must match pgPort in devenv.nix

[tool.coverage.run]
omit = ["superhero_project/db/migrations/*"]
# coverage.py's default sys.settrace backend loses coroutine frames after an
# `await` that suspends into a thread-pool executor (e.g. aiosqlite).  The
# sys.monitoring backend (Python 3.12+) instruments at the interpreter level
# and correctly follows coroutines through suspension/resumption.
core = "sysmon"

[tool.coverage.report]
fail_under = 100
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
]

[tool.bandit]
exclude_dirs = ["tests", "scripts"]
skips = ["B105"]

[tool.alembic]
script_location = "alembic"
prepend_sys_path = ["."]

[[tool.alembic.post_write_hooks]]
name = "ruff-format"
type = "exec"
executable = "ruff"
options = "format REVISION_SCRIPT_FILENAME"

[[tool.alembic.post_write_hooks]]
name = "ruff-check"
type = "exec"
executable = "ruff"
options = "check --fix REVISION_SCRIPT_FILENAME"
